name: Deploy Website
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |

            cd /root/projects/website

            echo "Pulling latest code..."
            git pull origin main

            VERSION=$(date +%s)
            DATE=$(date +%Y-%m-%d)

            CONTAINER_NAME="mya-gopi-web-v${VERSION}-${DATE}"

            echo "Stopping old containers..."
            docker ps -q --filter "name=mya-gopi-web" | xargs -r docker stop

            echo "Removing old containers..."
            docker ps -aq --filter "name=mya-gopi-web" | xargs -r docker rm

            echo "Removing old images..."
            docker images "mya-gopi-web" -q | xargs -r docker rmi -f

            echo "Building new Docker image..."
            docker build -t mya-gopi-web:${VERSION} .

            echo "Running new container..."
            docker run -d \
              -p 83:80 \
              --name $CONTAINER_NAME \
              mya-gopi-web:${VERSION}
